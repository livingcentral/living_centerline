name: iOS starter workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS app for simulator
    runs-on: macos-latest
    env:
      APPETIZE_API_KEY: ${{ secrets.APPETIZE_API_KEY }}
      APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version

      - name: List project schemes
        working-directory: Living-Centerline
        run: |
          xcodebuild -list -project Living-Centerline.xcodeproj

      - name: Resolve Swift packages
        working-directory: Living-Centerline
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project Living-Centerline.xcodeproj \
            -scheme Living-Centerline

      - name: Build
        working-directory: Living-Centerline
        run: |
          xcodebuild \
            -project Living-Centerline.xcodeproj \
            -scheme Living-Centerline \
            -configuration Screenshot \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Capture simulator screenshot
        working-directory: Living-Centerline
        run: |
          set -euo pipefail

          mkdir -p screenshots

          runtime=$(xcrun simctl list runtimes available -j | ruby -rjson -e '
            runtimes = JSON.parse(STDIN.read)["runtimes"]
            ios = runtimes.select { |r| r["platform"] == "iOS" && r["isAvailable"] }
            puts ios.max_by { |r| Gem::Version.new(r["version"]) }["identifier"]
          ')

          device_type=$(xcrun simctl list devicetypes -j | ruby -rjson -e '
            types = JSON.parse(STDIN.read)["devicetypes"]
            preferred = types.find { |d| d["name"] == "iPhone 16" } ||
              types.find { |d| d["name"] == "iPhone 15" } ||
              types.find { |d| d["name"].start_with?("iPhone") }
            puts preferred["identifier"]
          ')

          udid=$(xcrun simctl create LivingCenterlineScreenshot "$device_type" "$runtime")
          trap 'xcrun simctl shutdown "$udid" || true; xcrun simctl delete "$udid" || true' EXIT

          xcrun simctl boot "$udid"
          xcrun simctl bootstatus "$udid" -b

          app_path="build/Build/Products/Screenshot-iphonesimulator/Living-Centerline.app"
          xcrun simctl install "$udid" "$app_path"

          for screen in login home survey settings; do
            xcrun simctl terminate "$udid" com.looseimpediment.CenterLine || true
            xcrun simctl launch "$udid" com.looseimpediment.CenterLine \
              -LCIScreenshotScreen "$screen"
            sleep 8
            xcrun simctl io "$udid" screenshot "screenshots/${screen}.png"
          done

      - name: Upload simulator artifacts
        uses: actions/upload-artifact@v4
        with:
          name: living-centerline-simulator
          path: |
            Living-Centerline/screenshots/*.png
            Living-Centerline/build/Build/Products/Screenshot-iphonesimulator/Living-Centerline.app

      - name: Upload simulator app to Appetize
        if: ${{ env.APPETIZE_API_KEY != '' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch') }}
        working-directory: Living-Centerline
        run: |
          set -euo pipefail

          app_path="build/Build/Products/Screenshot-iphonesimulator/Living-Centerline.app"
          zip_path="build/Build/Products/Screenshot-iphonesimulator/Living-Centerline-appetize.zip"
          response_path="build/Build/Products/Screenshot-iphonesimulator/appetize-response.json"

          if [[ ! -d "$app_path" ]]; then
            echo "Expected simulator app not found at $app_path" >&2
            exit 1
          fi

          rm -f "$zip_path" "$response_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_path"

          endpoint="https://api.appetize.io/v1/apps"
          if [[ -n "${APPETIZE_PUBLIC_KEY:-}" ]]; then
            endpoint="${endpoint}/${APPETIZE_PUBLIC_KEY}"
          fi

          http_status=$(curl -sS -o "$response_path" -w "%{http_code}" \
            -X POST "$endpoint" \
            -H "X-API-KEY: ${APPETIZE_API_KEY}" \
            -F "file=@${zip_path}" \
            -F "platform=ios")

          cat "$response_path"
          echo

          if [[ "$http_status" -lt 200 || "$http_status" -ge 300 ]]; then
            echo "Appetize upload failed with HTTP status $http_status" >&2
            exit 1
          fi

          public_key=$(ruby -rjson -e 'puts JSON.parse(File.read(ARGV[0]))["publicKey"].to_s' "$response_path")
          version_code=$(ruby -rjson -e 'puts JSON.parse(File.read(ARGV[0]))["versionCode"].to_s' "$response_path")

          echo "Appetize publicKey: $public_key"
          echo "Appetize versionCode: $version_code"
          echo "If this is the first successful upload, add APPETIZE_PUBLIC_KEY=$public_key as a GitHub Actions repository secret."
